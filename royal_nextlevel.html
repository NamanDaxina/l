```html
<!DOCTYPE html>
<html>
<head>
<title>Royal Next Level Restaurant</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Segoe UI;
background:black;
color:white;
overflow-x:hidden;
}

/* FIRE CURSOR */

.spark{
position:fixed;
width:8px;
height:8px;
background:orange;
border-radius:50%;
pointer-events:none;
animation:fire .7s linear forwards;
}

@keyframes fire{
to{
transform:translateY(-40px) scale(0);
opacity:0;
}
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#000,#111,#000);
animation:bg 10s infinite alternate;
}

@keyframes bg{
from{background-position:0%}
to{background-position:100%}
}

.hero h1{
font-size:60px;
color:gold;
text-shadow:0 0 30px gold;
}

/* 3D CARD */

.scene{
width:320px;
height:420px;
margin:40px auto;
perspective:1000px;
}

.card{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:1s;
cursor:pointer;
}

.card:hover{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
box-shadow:0 0 25px gold;
}

.back{
transform:rotateY(180deg);
}

.item{
margin:8px;
font-size:20px;
}

/* FORM */

.formBox{
text-align:center;
margin:50px 10px;
}

input,button{
padding:12px;
margin:8px;
border-radius:25px;
border:none;
font-size:16px;
}

button{
background:gold;
cursor:pointer;
}

/* GALLERY */

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.gallery img{
width:140px;
margin:10px;
border-radius:15px;
cursor:pointer;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}

.popup img{
width:60%;
border-radius:20px;
}

/* MOBILE */

@media(max-width:500px){
.hero h1{font-size:40px;}
.scene{width:260px;height:360px;}
.popup img{width:90%;}
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="hero">
<h1>ROYAL NEXT LEVEL</h1>
</div>

<!-- 3D CARD -->
<div class="scene">
<div class="card">
<div class="face">
<h2>Menu</h2>
<div class="item">🥔 Smiley Potato</div>
<div class="item">🧈 Paneer Butter Masala</div>
<div class="item">🥙 Kulcha</div>
<div class="item">🍚 Jeera Rice</div>
<div class="item">🍫 Chocolate Bliss</div>
<div class="item">🌹 Rose Lassi</div>
</div>

<div class="face back">
<h2>Royal Taste</h2>
<p>Click Again to Flip</p>
</div>
</div>
</div>

<!-- LOGIN / BOOKING -->
<div class="formBox">
<h2>Book Your Table</h2>
<input placeholder="Your Name">
<input placeholder="Mobile Number">
<button onclick="alert('Table Booked Successfully!')">Book Now</button>
</div>

<!-- GALLERY -->
<div class="gallery">
<img src="https://source.unsplash.com/300x300/?paneer" onclick="openPop(this)">
<img src="https://source.unsplash.com/300x300/?kulcha" onclick="openPop(this)">
<img src="https://source.unsplash.com/300x300/?rice" onclick="openPop(this)">
<img src="https://source.unsplash.com/300x300/?dessert" onclick="openPop(this)">
</div>

<div class="popup" id="popup" onclick="closePop()">
<img id="popimg">
</div>

<script>

/* FIRE CURSOR */

document.addEventListener("mousemove",e=>{
let s=document.createElement("div");
s.className="spark";
s.style.left=e.clientX+"px";
s.style.top=e.clientY+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),700);
});

/* POPUP */

function openPop(img){
document.getElementById("popup").style.display="flex";
document.getElementById("popimg").src=img.src;
}

function closePop(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
```
