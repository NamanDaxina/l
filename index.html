<!DOCTYPE html>
<html>
<head>
<title>Royal Feast Menu</title>

<style>

body{
    margin:0;
    height:100vh;
    background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
    background-size: 600% 600%;
    animation: bgMove 12s ease infinite;
    font-family: 'Segoe UI', sans-serif;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.menu{
    width:480px;
    margin:60px auto;
    padding:35px;
    border-radius:30px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(15px);
    box-shadow:0 0 40px rgba(255,215,0,0.4);
    text-align:center;
    color:white;
}

h1{
    font-size:42px;
    letter-spacing:4px;
    color:gold;
    text-shadow:0 0 20px gold;
    animation: glowTitle 2s infinite alternate;
}

@keyframes glowTitle{
    from{text-shadow:0 0 10px gold;}
    to{text-shadow:0 0 30px gold;}
}

.section{
    margin-top:28px;
}

.section h2{
    color:#ffcc70;
    border-bottom:2px solid gold;
    padding-bottom:5px;
    letter-spacing:3px;
}

.item{
    font-size:22px;
    margin:10px 0;
    transition:0.4s;
    padding:6px;
    border-radius:10px;
}

.item:hover{
    transform:scale(1.12);
    background: rgba(255,215,0,0.2);
    box-shadow:0 0 15px gold;
}

.footer{
    margin-top:30px;
    font-size:18px;
    color:#ffcc70;
    animation: shine 3s infinite;
}

@keyframes shine{
    0%{opacity:0.5;}
    50%{opacity:1;}
    100%{opacity:0.5;}
}

</style>
</head>

<body>

<div class="menu">

<h1>✨ ROYAL FEAST ✨</h1>

<div class="section">
<h2>Starter</h2>
<div class="item">🥔 Smiley Potato</div>
</div>

<div class="section">
<h2>Main Course</h2>
<div class="item">🧈 Paneer Butter Masala</div>
<div class="item">🥙 Kulcha</div>
<div class="item">🍚 Jeera Rice</div>
<div class="item">🥗 Salad</div>
</div>

<div class="section">
<h2>Dessert</h2>
<div class="item">🍫 Chocolate Bliss</div>
</div>

<div class="section">
<h2>Drink</h2>
<div class="item">🌹 Rose Lassi</div>
</div>

<div class="footer">
⭐ Experience Luxury Taste ⭐
</div>

</div>

</body>
</html>
