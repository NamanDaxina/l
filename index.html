<!DOCTYPE html>
<html>
<head>
<title>Food Fiesta Menu</title>

<style>
body{
    background: linear-gradient(135deg,#ffecd2,#fcb69f);
    font-family: Arial, Helvetica, sans-serif;
}

.menu-card{
    width: 420px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    text-align: center;
}

h1{
    color:#ff5733;
    font-size: 38px;
    margin-bottom: 5px;
}

.tagline{
    color: gray;
    margin-bottom: 25px;
}

.section{
    margin-top: 25px;
}

.section h2{
    background: #ff5733;
    color: white;
    padding: 8px;
    border-radius: 12px;
    letter-spacing: 2px;
}

.item{
    font-size: 20px;
    margin: 8px 0;
    color:#333;
}

.footer{
    margin-top: 30px;
    font-weight: bold;
    color:#ff5733;
}
</style>

</head>

<body>

<div class="menu-card">

<h1>🍽 FOOD FIESTA</h1>
<div class="tagline">Taste • Happiness • Celebration</div>

<div class="section">
<h2>⭐ Starter</h2>
<div class="item">🥔 Smiley Potato</div>
</div>

<div class="section">
<h2>🍛 Main Course</h2>
<div class="item">🧈 Paneer Butter Masala</div>
<div class="item">🥙 Kulcha</div>
<div class="item">🍚 Jeera Rice</div>
<div class="item">🥗 Fresh Salad</div>
</div>

<div class="section">
<h2>🍫 Dessert</h2>
<div class="item">Chocolate Bliss</div>
</div>

<div class="section">
<h2>🥤 Drink</h2>
<div class="item">Rose Lassi</div>
</div>

<div class="footer">
✨ Enjoy Your Meal ✨
</div>

</div>

</body>
</html>
