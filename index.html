```html
<!DOCTYPE html>
<html>
<head>
<title>Royal Taste Restaurant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:Segoe UI;
background:#0b0b0b;
color:white;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(270deg,#000,#111,#000);
background-size:400% 400%;
animation:bgmove 12s infinite;
}

@keyframes bgmove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

.hero h1{
font-size:60px;
color:gold;
text-shadow:0 0 30px gold;
margin:0;
}

.hero p{
color:#ccc;
}

.btn{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:40px;
background:gold;
cursor:pointer;
font-size:18px;
}

/* MENU */

.menu{
padding:80px 20px;
text-align:center;
}

.card{
max-width:500px;
margin:auto;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,215,0,.4);
}

.section{
margin-top:25px;
}

.section h2{
color:#ffcc70;
border-bottom:2px solid gold;
padding-bottom:6px;
letter-spacing:3px;
}

.item{
font-size:22px;
margin:10px;
padding:8px;
border-radius:12px;
transition:.4s;
}

.item:hover{
transform:scale(1.1);
background:rgba(255,215,0,.2);
box-shadow:0 0 20px gold;
}

/* GALLERY */

.gallery{
padding:70px 20px;
text-align:center;
}

.images{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.images img{
width:160px;
margin:10px;
border-radius:15px;
transition:.4s;
cursor:pointer;
}

.images img:hover{
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

/* BOOKING */

.booking{
padding:80px 20px;
text-align:center;
}

input,button{
padding:12px;
margin:8px;
border-radius:25px;
border:none;
font-size:16px;
}

button{
background:linear-gradient(45deg,gold,orange);
cursor:pointer;
}

/* FOOTER */

.footer{
padding:25px;
text-align:center;
background:black;
color:#aaa;
}

/* MOBILE */

@media(max-width:500px){
.hero h1{font-size:40px;}
.images img{width:120px;}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>ROYAL TASTE</h1>
<p>Luxury Dining Experience</p>
<a href="#menu"><button class="btn">View Menu</button></a>
</div>

<!-- MENU -->
<div class="menu" id="menu">
<div class="card">

<div class="section">
<h2>Starter</h2>
<div class="item">🥔 Smiley Potato</div>
</div>

<div class="section">
<h2>Main Course</h2>
<div class="item">🧈 Paneer Butter Masala</div>
<div class="item">🥙 Kulcha</div>
<div class="item">🍚 Jeera Rice</div>
<div class="item">🥗 Salad</div>
</div>

<div class="section">
<h2>Dessert</h2>
<div class="item">🍫 Chocolate Bliss</div>
</div>

<div class="section">
<h2>Drink</h2>
<div class="item">🌹 Rose Lassi</div>
</div>

</div>
</div>

<!-- GALLERY -->
<div class="gallery">
<h2>Food Gallery</h2>
<div class="images">
<img src="https://source.unsplash.com/300x300/?paneer">
<img src="https://source.unsplash.com/300x300/?kulcha">
<img src="https://source.unsplash.com/300x300/?rice">
<img src="https://source.unsplash.com/300x300/?dessert">
</div>
</div>

<!-- BOOKING -->
<div class="booking">
<h2>Book Your Table</h2>
<input placeholder="Your Name">
<input placeholder="Mobile Number">
<br>
<button onclick="alert('Table Booked Successfully!')">Book Now</button>
</div>

<div class="footer">
© Royal Taste Restaurant
</div>

</body>
</html>
```
